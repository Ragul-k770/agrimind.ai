<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome to AgriMind AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .landing-bg {
            background: linear-gradient(rgba(20,50,25,0.7), rgba(20,50,25,0.7)), url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=2600&auto=format&fit=crop') center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .landing-bg h1 {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .landing-bg p {
            font-size: 1.5rem;
            margin-bottom: 40px;
            max-width: 600px;
        }
        .landing-btns {
            display: flex;
            gap: 20px;
        }
        .btn-outline {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border: 2px solid white;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-outline:hover {
            background: white;
            color: #1b5e20;
        }
        .btn-solid {
            background: #22c55e;
            border: 2px solid #22c55e;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(34,197,94,0.4);
        }
        .btn-solid:hover {
            background: #16a34a;
            border-color: #16a34a;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="landing-bg">
        <h1>🌱 AgriMind AI</h1>
        <p>The smartest AI assistant for modern farmers. Get instant insights on weather, crops, soil, and market trends.</p>
        <div class="landing-btns">
            <a href="register.html" class="btn-solid">Get Started</a>
            <a href="login.html" class="btn-outline">Login</a>
        </div>
    </div>
</body>
</html>
