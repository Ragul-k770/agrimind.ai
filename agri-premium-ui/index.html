<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriMind AI - Premium Advisory</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Live Video Background (real agriculture scene) -->
    <video id="bg-video" autoplay loop muted playsinline>
        <source src="https://videos.pexels.com/video-files/2821216/2821216-hd_1920_1080_24fps.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <!-- Dark overlay for readability -->
    <div class="video-overlay"></div>

    <!-- Floating Leaf Animation Canvas -->
    <canvas id="leaf-canvas"></canvas>

    <!-- Main Chat Interface -->
    <main class="app-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="logo">
                <i class="fa-solid fa-leaf"></i>
                <span>AgriMind AI</span>
            </div>
            <div class="status">
                <span class="pulse"></span> Online
            </div>
        </header>

        <!-- Messages Area -->
        <div class="chat-messages" id="chat-messages">
            <!-- Initial AI Message -->
            <div class="message ai-message">
                <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="content">
                    <p>Welcome! I am AgriMind AI, your intelligent farming assistant. How can I help optimize your crop yields today?</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-container">
            <div class="input-wrapper">
                <input type="text" id="chat-input" placeholder="Ask AgriMind AI..." autocomplete="off">
                <button id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/app.js"></script>
</body>
</html>
